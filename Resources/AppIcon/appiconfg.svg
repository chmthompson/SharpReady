<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!--
        Pencil rotated 45° (pointing bottom-right, ready to write).
        Designed upright then rotated around canvas centre (228,228).

        Upright layout (x: 201–255, total width 54px):
          Eraser cap  y: 82–106  (rounded top)
          Ferrule     y: 106–118 (metal band)
          Body        y: 118–312 (pencil barrel)
          Wood tip    y: 312–358 (tapered cone)
          Graphite    y: 358–374 (sharp point)
    -->
    <g transform="rotate(45, 228, 228)">

        <!-- Eraser cap (rounded) -->
        <rect x="201" y="82" width="54" height="24" rx="10" fill="white" opacity="0.60"/>

        <!-- Ferrule / metal band -->
        <rect x="201" y="106" width="54" height="12" fill="white" opacity="0.40"/>

        <!-- Pencil body -->
        <rect x="201" y="118" width="54" height="194" fill="white" opacity="0.92"/>
        <!-- Left-edge shadow (hex facet illusion) -->
        <rect x="201" y="118" width="12" height="194" fill="black" opacity="0.10"/>
        <!-- Right-edge shadow -->
        <rect x="243" y="118" width="12" height="194" fill="black" opacity="0.07"/>
        <!-- Centre highlight streak -->
        <rect x="222" y="118" width="12" height="194" fill="white" opacity="0.18"/>

        <!-- Wood cone (tip) -->
        <polygon points="201,312 255,312 228,358" fill="white" opacity="0.72"/>

        <!-- Graphite tip (sharp point) -->
        <polygon points="218,352 238,352 228,374" fill="white" opacity="1.0"/>

    </g>

    <!-- Writing trail — short dashed line from the tip going bottom-right -->
    <line x1="295" y1="320" x2="338" y2="363"
          stroke="white" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="8,10" opacity="0.35"/>
</svg>
